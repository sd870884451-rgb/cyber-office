<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// RENDERER
const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(innerWidth, innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(58, innerWidth / innerHeight, 0.1, 120);
camera.position.set(0, 9, 18);

controls.dampingFactor = 0.05;
controls.maxPolarAngle = Math.PI * 0.46;
controls.minDistance = 6;
controls.maxDistance = 36;
controls.target.set(0, 2, 0);
controls.update();

  floor:  new THREE.MeshStandardMaterial({ color:0x060612, roughness:0.08, metalness:0.98 }),
  wall:   new THREE.MeshStandardMaterial({ color:0x040410, roughness:0.9,  metalness:0.05 }),
  wallR:  new THREE.MeshStandardMaterial({ color:0x040410, roughness:0.9,  metalness:0.05 }),
  desk:   new THREE.MeshStandardMaterial({ color:0x0a1525, roughness:0.22, metalness:0.88 }),
  metal:  new THREE.MeshStandardMaterial({ color:0x0d0d22, metalness:0.95, roughness:0.1 }),
  neon:   (c) => new THREE.MeshStandardMaterial({ color:c, emissive:c, emissiveIntensity:2.5, roughness:0.1, metalness:0 }),
  screen: new THREE.MeshStandardMaterial({ color:0x000820, emissive:0x003366, emissiveIntensity:0.9, roughness:0.05, metalness:0.3 }),
  glass:  new THREE.MeshPhysicalMaterial({ color:0x88aadd, transparent:true, opacity:0.12, roughness:0, metalness:0, transmission:0.88 }),
  shelf:  new THREE.MeshStandardMaterial({ color:0x0a0a20, roughness:0.4, metalness:0.8 }),
  plant:  new THREE.MeshStandardMaterial({ color:0x003311, roughness:0.9, metalness:0 }),
  pot:    new THREE.MeshStandardMaterial({ color:0x1a1a3a, roughness:0.3, metalness:0.7 }),
  ceil:   new THREE.MeshStandardMaterial({ color:0x030310, roughness:1 }),
};

// ROOM
const floor = new THREE.Mesh(new THREE.PlaneGeometry(42, 42), MF.floor);
floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true;
scene.add(floor);
const ceil = new THREE.Mesh(new THREE.PlaneGeometry(42, 42), MF.ceil);
ceil.rotation.x = Math.PI / 2; ceil.position.y = 10;
scene.add(ceil);

const wallGeo = (w, h) => new THREE.PlaneGeometry(w, h);
const backWall = new THREE.Mesh(wallGeo(42, 10), MF.wall);
backWall.position.set(0, 5, -13); backWall.receiveShadow = true;
scene.add(backWall);
const leftWall = new THREE.Mesh(wallGeo(26, 10), MF.wallR);
leftWall.rotation.y = Math.PI / 2; leftWall.position.set(-13, 5, 0); leftWall.receiveShadow = true;
scene.add(leftWall);
const rightWall = new THREE.Mesh(wallGeo(26, 10), MF.wallR);
rightWall.rotation.y = -Math.PI / 2; rightWall.position.set(13, 5, 0);
scene.add(rightWall);
const frontWall = new THREE.Mesh(wallGeo(42, 10), MF.wall);
frontWall.rotation.y = Math.PI; frontWall.position.set(0, 5, 13);
scene.add(frontWall);

// Floor grid
const grid = new THREE.GridHelper(42, 84, 0x00ffff, 0x001133);
grid.position.y = 0.002;
grid.material.opacity = 0.18; grid.material.transparent = true;
scene.add(grid);

// CEILING NEON FRAME
function ceilStrip(x1,z1,x2,z2,col){
  const pts = [new THREE.Vector3(x1,9.9,z1), new THREE.Vector3(x2,9.9,z2)];
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, 6, 0.04, 6, false);
  scene.add(new THREE.Mesh(geo, MF.neon(col)));
}

ceilStrip(-12,-12,-12, 6, 0x00ffff);
ceilStrip( 12,-12, 12, 6, 0x00ffff);

// ===== WORKSTATION (desk area) =====
function makeDesk(x, z){
  const g = new THREE.Group(); g.position.set(x, 0, z);
  const top = new THREE.Mesh(new THREE.BoxGeometry(6.5, 0.07, 2.5), MF.desk);
  top.position.y = 1.25; top.castShadow = true; top.receiveShadow = true;
  g.add(top);
  // Neon underglow
  const n1 = new THREE.Mesh(new THREE.BoxGeometry(6.52, 0.025, 0.025), MF.neon(0x00ffff));
  n1.position.set(0, 1.26, 1.23); g.add(n1);
  const n2 = n1.clone(); n2.position.z = -1.23; n2.material = MF.neon(0xff00ff); g.add(n2);
  // Legs
  [[-3.0,-0.95],[3.0,-0.95],[-3.0,0.95],[3.0,0.95]].forEach(([lx,lz])=>{
    const leg = new THREE.Mesh(new THREE.BoxGeometry(0.07, 1.25, 0.07), MF.metal);
    leg.position.set(lx, 0.62, lz); leg.castShadow = true; g.add(leg);
  });
  scene.add(g); return g;
}
makeDesk(-4.5, 2.5);

// MONITORS (3 screens)
function makeMonitor(x, y, z, ry=0, rx=-0.12, sc=1){
  const g = new THREE.Group(); g.position.set(x, y, z);
  g.rotation.y = ry; g.rotation.x = rx;
  const frame = new THREE.Mesh(new THREE.BoxGeometry(2.4*sc, 1.5*sc, 0.05), MF.metal);
  frame.castShadow = true; g.add(frame);
  const scr = new THREE.Mesh(new THREE.PlaneGeometry(2.26*sc, 1.36*sc), MF.screen);
  scr.position.z = 0.027; g.add(scr);
  const glow = new THREE.Mesh(new THREE.PlaneGeometry(2.2*sc, 1.3*sc),
    new THREE.MeshBasicMaterial({ color:0x0044aa, transparent:true, opacity:0.08 }));
  glow.position.z = 0.028; g.add(glow);
  const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.04, 0.5*sc, 6), MF.metal);
  pole.position.set(0, -0.94*sc, 0); g.add(pole);
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.36*sc, 0.42*sc, 0.04, 8), MF.metal);
  base.position.set(0, -1.2*sc, 0); g.add(base);
  scene.add(g); return g;
}

makeMonitor(-4.5, 2.95, 2.3,  0,    -0.12, 1.15);
makeMonitor(-2.8, 2.65, 2.5,  0.15, -0.12, 1.0);

// KEYBOARD
const kbG = new THREE.Group(); kbG.position.set(-4.5, 1.32, 2.9);
const kbBase = new THREE.Mesh(new THREE.BoxGeometry(1.9, 0.04, 0.72), MF.metal);
kbBase.castShadow = true; kbG.add(kbBase);
for(let r=0; r<4; r++){
  for(let c=0; c<15; c++){
    const key = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.034, 0.1),
      new THREE.MeshStandardMaterial({ color:0x0a0a20, roughness:0.3, metalness:0.7 }));
    key.position.set(-0.78+c*0.112, 0.02, -0.26+r*0.17);
    kbG.add(key);
  }
}
scene.add(kbG);

// MOUSE
const mouse3d = new THREE.Mesh(new THREE.BoxGeometry(0.23, 0.04, 0.33),
  new THREE.MeshStandardMaterial({ color:0x111133, metalness:0.9, roughness:0.2 }));
mouse3d.position.set(-3.0, 1.32, 2.75); mouse3d.castShadow = true;
scene.add(mouse3d);

// COFFEE MUG
const mugG = new THREE.Group(); mugG.position.set(-6.5, 1.33, 1.6);
const mugBody = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.11, 0.27, 12), MF.pot);
mugG.add(mugBody);
const mugH = new THREE.Mesh(new THREE.TorusGeometry(0.075, 0.018, 6, 12, Math.PI), MF.pot);
mugH.position.set(0.14, 0, 0); mugH.rotation.y = Math.PI/2; mugG.add(mugH);
const coffee = new THREE.Mesh(new THREE.CylinderGeometry(0.095, 0.095, 0.02, 12),

coffee.position.y = 0.11; mugG.add(coffee);
// Steam
const steamG = new THREE.Group(); steamG.position.set(-6.5, 1.5, 1.6);
for(let s=0;s<3;s++){

scene.add(mugG); scene.add(steamG);

function makeRobot(){
  const g = new THREE.Group();
  const bMat = new THREE.MeshStandardMaterial({ color:0x1a1a3a, metalness:0.88, roughness:0.15, emissive:0x000844, emissiveIntensity:0.3 });

  const body = new THREE.Mesh(new THREE.BoxGeometry(0.78, 0.98, 0.52), bMat);
  body.position.y = 1.52; body.castShadow = true; g.add(body);
  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.58, 0.52, 0.48), bMat);
  head.position.y = 2.26; head.castShadow = true; g.add(head);
  // Eyes
  const eyeMat = new THREE.MeshStandardMaterial({ color:0x00ffff, emissive:0x00ffff, emissiveIntensity:4 });
  [-0.14, 0.14].forEach((ex, i)=>{
    const eye = new THREE.Mesh(new THREE.PlaneGeometry(0.14, 0.09), eyeMat);
    eye.position.set(ex, 2.29, 0.25); g.add(eye);
    const eg = new THREE.Mesh(new THREE.PlaneGeometry(0.19, 0.13),
      new THREE.MeshBasicMaterial({ color:0x00ffff, transparent:true, opacity:0.12 }));
    eg.position.set(ex, 2.29, 0.25); g.add(eg);
  });
  // Third eye
  const ec = new THREE.Mesh(new THREE.PlaneGeometry(0.075, 0.075), eyeMat);
  ec.position.set(0, 2.4, 0.25); g.add(ec);
  // Antenna
  const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.022, 0.022, 0.38, 6), bMat);
  ant.position.set(0, 2.68, 0); g.add(ant);
  const antB = new THREE.Mesh(new THREE.SphereGeometry(0.058, 8, 8), MF.neon(0x00ffff));
  antB.position.set(0, 2.9, 0); g.add(antB);
  // Arms
  const armM = new THREE.Mesh(new THREE.BoxGeometry(0.16, 0.74, 0.16), bMat);
  [[-0.52, 0.24], [0.52, -0.24]].forEach(([ax, rz], i)=>{
    const arm = armM.clone(); arm.position.set(ax, 1.42, 0); arm.rotation.z = rz; arm.castShadow = true; g.add(arm);
  });
  // Legs
  const legM = new THREE.Mesh(new THREE.BoxGeometry(0.21, 0.67, 0.21), bMat2);
  [-0.23, 0.23].forEach(lx=>{
    const leg = legM.clone(); leg.position.set(lx, 0.83, 0); leg.castShadow = true; g.add(leg);
  });
  // Chest neon cross
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.065, 0.065), MF.neon(0xff00ff)), {position: new THREE.Vector3(0, 1.62, 0.27)}));
  g.add(Object.assign(new THREE.Mesh(new THREE.BoxGeometry(0.065, 0.42, 0.065), MF.neon(0x00ffff)), {position: new THREE.Vector3(0, 1.54, 0.27)}));
  // Badge
  const badge = new THREE.Mesh(new THREE.PlaneGeometry(0.25, 0.25),
    new THREE.MeshStandardMaterial({ color:0xff6600, emissive:0xff4400, emissiveIntensity:1.5, transparent:true, opacity:0.9, side:THREE.DoubleSide }));
  badge.position.set(0, 1.72, 0.28); g.add(badge);
  scene.add(g); return g;
}

function makeShelf(){
  const g = new THREE.Group(); g.position.set(10.5, 0, -4);
  const back = new THREE.Mesh(new THREE.BoxGeometry(3.6, 7.2, 0.08), MF.shelf);
  back.position.set(0, 3.6, -0.55); g.add(back);
  [-1.8, 1.8].forEach(sx=>{
    const side = new THREE.Mesh(new THREE.BoxGeometry(0.06, 7.2, 1.1), MF.shelf);
    side.position.set(sx, 3.6, 0); side.castShadow = true; g.add(side);
  });
  for(let i=0; i<6; i++){
    const shelf = new THREE.Mesh(new THREE.BoxGeometry(3.6, 0.065, 1.0), MF.shelf);
    shelf.position.set(0, i*1.2+0.8, 0); shelf.castShadow = true; shelf.receiveShadow = true; g.add(shelf);
    if(i < 5){
      const bookCols = [0x881122, 0x003388, 0x007744, 0x884400, 0x440088, 0x007888];
      let bx = -1.55;
      for(let b=0; b<7; b++){
        const bw = 0.07 + Math.random()*0.07;
        const bh = 0.7 + Math.random()*0.4;
        if(bx + bw > 1.6) break;
        const book = new THREE.Mesh(new THREE.BoxGeometry(bw, bh, 0.7),
          new THREE.MeshStandardMaterial({ color:bookCols[b%6], roughness:0.85 }));
        book.position.set(bx + bw/2, i*1.2+0.83+bh/2, 0); book.castShadow = true; g.add(book);
        bx += bw + 0.018;
      }
    }
  }
  const nt = new THREE.Mesh(new THREE.BoxGeometry(3.62, 0.04, 0.04), MF.neon(0xff00ff));
  nt.position.set(0, 7.22, 0.52); g.add(nt);
  scene.add(g); return g;
}

// ===== ANIMATE =====
const T = new THREE.Clock();
function animate(){
  requestAnimationFrame(animate);
  const t = T.getElapsedTime();

  // Robot idle
  robot.position.y = Math.sin(t*0.65)*0.07;
  robot.rotation.y = Math.sin(t*0.22)*0.13;
  robot.children.forEach((c,i)=>{
    if(i===2||i===3){ c.material.emissiveIntensity = 3.5+Math.sin(t*3)*1.5; }
  });

  // Nodes float
  nodeG.children.forEach(n=>{
    n.position.y = n.userData.baseY + Math.sin(t*n.userData.speed+n.userData.phase)*0.32;
    n.rotation.x += 0.008; n.rotation.y += 0.014;
  });

  // Rain
  const rp = rGeo.attributes.position.array;
  for(let i=0;i<RCNT;i++){
    rp[i*3+1] -= rSpd[i];
    if(rp[i*3+1] < -1){ rp[i*3+1]=24; rp[i*3]=(Math.random()-0.5)*55; rp[i*3+2]=(Math.random()-0.5)*45-6; }
  }
  rGeo.attributes.position.needsUpdate = true;

  // Dust
  const dp = dGeo.attributes.position.array;
  for(let i=0;i<DCNT;i++){
    dp[i*3]   += Math.sin(t*0.3+i)*0.002;
    dp[i*3+1] += 0.0016;
    if(dp[i*3+1]>9.5){ dp[i*3+1]=0; dp[i*3]=(Math.random()-0.5)*24; dp[i*3+2]=(Math.random()-0.5)*24; }
  }
  dGeo.attributes.position.needsUpdate = true;

  // Lights
  mainL.intensity  = 3.5 + Math.sin(t*1.5)*0.7;
  deskL.intensity  = 2.5 + Math.sin(t*2.5)*0.55;
  lampG.material.emissiveIntensity = 3.5+Math.sin(t*2)*1.2;
  lampG.material.opacity = 0.6+Math.sin(t*2)*0.15;

  // Holo flicker
  holoMain.children.forEach(c=>{
    if(c.material && c.material.emissiveIntensity > 1.5){
      if(Math.random() > 0.997){ c.material.emissiveIntensity *= 0.18; setTimeout(()=>{ c.material.emissiveIntensity *= 5.5; }, 75); }
    }
  });

  // Random notif
  if(t - lastNotifT > 15){
    notif(MSGS[Math.floor(Math.random()*MSGS.length)]);
    lastNotifT = t;
    // Rotate status
    KSTATS.forEach((k,i)=>{
      const el=document.getElementById('kv'+i);
      if(el) el.innerHTML = k.vals[Math.floor(Math.random()*k.vals.length)];
    });
  }

  // XP fluctuation
  if(Math.random() > 0.997)
    xpT = Math.max(4, Math.min(100, xpT + (Math.random()>0.5?6:-4)));

  tick(); updXP(); updUT(); updFPS(t);
  if(Math.floor(t)%3===0) drawMM();

  controls.update();
  renderer.render(scene, camera);
}
